body:
  text: 東晉天竺居士竺難提晉言法喜譯如是我聞一時佛住毗舍離菴羅樹園大林精舍重閣講堂與千二百五十比丘皆阿羅漢諸漏已盡不受後有如鍊真金身心澄靜六通無礙其名曰大智舍利弗摩訶目揵連摩訶迦葉摩訶迦旃延須菩提阿㝹樓馱劫賓那橋梵波提畢陵伽婆蹉薄拘羅難陀阿難陀羅睺羅如是等衆所知識常為天龍八部所敬復有菩薩摩訶薩二萬人俱大智本行皆悉成就調伏諸根滿足六度具佛威儀心大如海其名曰文殊師利童子寶月童子月光童子寶積童子曰藏童子跋陀婆羅菩薩與其同類十六人俱彌勒菩薩如是等菩薩摩訶薩二萬人爾時世尊與四衆天龍八部人非人等恭敬圍繞時毗舍離國一切人民遇大惡病一者眼赤如血二者兩耳出膿三者鼻中流血四者舌噤無聲五者所食之物化為麁澀六識閉塞猶如醉人有五夜叉名訖拏迦羅面黑如墨而有五眼狗牙上出吸人精氣時毗舍離大城之中有一長者名曰月蓋與其同類五百長者俱詣佛所到佛所已頭面作禮却住一面白言世尊此國人民遇大惡病良醫耆婆盡其道術所不能救唯願天尊慈愍一切救濟病苦令得無患爾時世尊告長者言去此不遠正主西方有佛世尊名無量壽彼有菩薩名觀世音及大勢至恆以大悲憐愍一切救濟苦厄汝今應當五體投地向彼作禮燒香散華繫念數息令心不散經十念頃為衆生故當請彼佛及二菩薩說是語時於佛光中得見西方無量壽佛并二菩薩如來神力佛及菩薩俱到此國往毗舍離住城門閫佛二菩薩與諸大衆放大光明照毗舍離皆作金色爾時毗舍離人即具楊枝淨水授與觀世音菩薩大悲觀世音憐愍救護一切衆生故而說呪曰普教一切衆生而作是言汝等今者應當一心稱南無佛南無法南無僧南無觀世音菩薩摩訶薩大悲大名稱救護苦厄者如此三稱三寶三稱觀世音菩薩名燒衆名香五體投地向於西方一心一意令氣息定為免苦厄請觀世音合十指掌而說偈言願救我苦厄大悲覆一切普放淨光明滅除癡暗冥為免殺害苦煩惱及衆病必來至我所施我大安樂我今稽首禮聞名救厄者我今自歸依世間慈悲父唯願必定來免我三毒苦施我今世樂及與大涅槃白佛言世尊如是神呪必定吉祥乃是過去現在未來十方諸佛大慈大悲陀羅尼印聞此呪者衆苦永盡常得安樂遠離八難得念佛定現前見佛我今當說十方諸佛救護衆生神呪多耶咃強鵝反嗚呼膩名好喉鬼摸呼膩名為癡鬼𨵁婆膩名怕人鬼耽婆膩名叛人鬼安茶詈名不白鬼般茶詈名為白鬼首埤帝名為青鬼般般茶茶囉囉名鬼母前鬼母婆私膩多姪咃如是伊梨寐梨名為去鬼提梨首梨名叛人鬼加波梨名戴髑髏鬼及縛著兩頰佉鞮端耆名食兒鬼旃陀梨名就人鬼摩蹬耆名師子頭鬼魔王鬼師子頭勒叉勒叉守護一切衆生薩婆薩埵薩婆婆耶埤云一切可鬼𦀟訶云㥯去多茶咃伽帝伽帝膩伽帝云已去也修留毗修留毗去莫來莫來也勒叉勒叉云守護薩婆婆耶埤𦀟訶云㥯去白佛言世尊如此神呪乃是十方三世無量諸佛之所宣說誦持此呪者常為諸佛諸大菩薩之所護持免離怖畏刀杖毒害及與疾病令得無患說是語時毗舍離人平復如本爾時世尊憐愍衆生覆護一切重請觀世音菩薩說消伏毒害陀羅尼呪爾時觀世音菩薩大悲熏心承佛神力而說破惡業障消伏毒害陀羅尼呪南無佛陀南無達摩南無僧伽南無觀世音菩提薩埵摩訶薩埵大慈大悲唯願愍我救護苦惱亦救一切怖畏衆生令得大護多姪咃陀呼膩名大鬼摸呼膩名水鬼閻婆膩耽婆膩阿婆凞虛抵反名人嗔鬼摸呼膩此鬼口出火名曰光鬼安茶梨名曰花鬼般茶梨此鬼身白名曰白鬼輸鞞帝名極白鬼般茶囉婆私膩休休樓樓三頭鬼安茶梨兜兜樓樓名三頭兒鬼般茶梨名母黑兒白鬼周周樓樓入山中去不殺周周樓樓名好偷人小兒山中住鬼膩槃茶梨名出白鬼豆豆富富豆豆名欲便去鬼富富名不更來鬼般茶囉婆私膩矧墀殯資反名億鬼跈墀乃軫反名不億鬼膩跈墀名最憶鬼薩婆阿婆耶羯多薩婆涅婆婆陀伽莫著疑人阿婆耶莫作鬼卑離陀云餓鬼閉殿娑訶莫來㥯去一切怖畏一切毒害一切惡鬼虎狼師子聞此呪時口即閉塞不能為害破梵行人作十惡業聞此呪時蕩除糞穢還得清淨設有業障濁惡不善稱觀世音菩薩誦持此呪即破業障現前見佛佛告阿難若有四部弟子受持觀世音菩薩名誦念消伏毒害陀羅尼行此呪者身常無患心亦無病設使大火從四面來焚燒己身誦持此呪故龍王降雨即得解脫設火焚身節節疼痛一心稱觀世音菩薩名號三誦此呪即得除愈設復貴飢饉王難惡獸盜賊迷於道路牢獄繫閉杻械枷鎖被五繫縛入於大海黑風回波水色之山夜叉羅剎之難毒藥刀劍臨當刑戮過去業緣現造衆惡以是因緣受一切苦極大怖畏應當一心稱觀世音菩薩名號并誦此呪一遍至七遍消伏毒害惡業惡行不善惡聚如火焚薪永盡無餘以是因緣此觀世音菩薩所說神呪名施一切衆生甘露妙藥得無病畏不橫死畏不被繫縛畏貪欲嗔恚愚癡三毒等畏是故此娑婆世界皆號觀世音菩薩為施無畏者此陀羅尼灌頂章句無上梵行畢定吉祥大功德海衆生聞者獲大安樂應當暗誦若欲誦之應當持齊不飲酒不噉肉以灰塗身澡浴清淨不食興渠五辛能熏之物悉不食之婦女穢污皆悉不往常念十方佛及七佛世尊一心稱觀世音菩薩誦持此呪現身得見觀音菩薩一切善願皆得成就後生佛前長與苦別佛告阿難王舍大城有一女人惡鬼所持名旃陀利彼鬼晝夜作丈夫形來嬈此女鬼精著身生五百鬼子汝憶是事不我於爾時教此女人稱觀世音菩薩善心相續入善境界阿難當知如此菩薩威神之力惡鬼消伏得見我身無比色像我於爾時一一毛孔現寶蓮華無數化佛異口同音稱讚大悲施無畏者令女受持讀誦通利此呪功德三障永盡免三界獄火不受衆苦四百四病一時不起設有衆生入陳鬪戰臨當被害誦念此呪稱於大悲觀世音菩薩名如鷹隼飛即得解脫若有衆生受大苦惱閉在囹圄杻械枷鎖及諸刑罰一日乃至十日一月乃至五月應當淨心係念一處稱觀世音菩薩歸依三寶三稱我名誦大吉祥六字章句救苦神呪而說呪曰多姪咃安陀詈般茶詈枳由詈名著瓔珞鬼檀陀詈名捉鐵捧鬼羶陀詈名捉釿鬼底耶婆陀名與人光鬼耶賒婆陀名聞鬼頗羅膩祇名長出齒鬼難多詈名大身鬼婆伽詈名大面鬼阿盧禰名閉目鬼薄鳩詈名著鍾鬼此鬼兩耳著大鍾摸鳩隸名披頭鬼兜毗隸名住石窟鬼𦀟呵爾時世尊說是神呪已告阿難言若善男子善女人四部弟子得聞觀世音菩薩名號并受持讀誦六字章句若行曠野迷失道徑誦此呪故觀世音菩薩大悲熏心化為人像示其道路令得安隱若當飢渴化作泉井果蓏飲食令得飽滿設復有人遇大禍對亡失國土妻子財産與怨憎會稱觀世音菩薩名號誦念此呪數息係念無分散意經七七日時大悲者化為天像及作大力鬼神王像接還本土令得安隱若復有人入海採寶空山曠野逢值虎狼師子毒蟲蝮蝎夜叉羅剎拘槃茶及諸惡鬼噉精氣者三稱觀世音菩薩名號及誦此呪即得解脫若有婦人生産難者臨當命終三稱觀世音菩薩名號并誦持此呪即得解脫遇大惡賊盜其財物三稱觀世音菩薩名號誦持此呪賊即慈心復道而去阿難當知如此菩薩及是神呪畢定吉祥常能消伏一切毒害真實不虛普施三界一切衆生令無怖畏作大擁護今世受樂後世生處見佛聞法速得解脫此呪威神巍巍無量能令衆生免地獄苦餓鬼苦畜生苦阿修羅苦及八難苦如水滅火永盡無餘阿難當知若有受持觀世音菩薩名并持此呪獲大善利消伏毒害今世後世不吉祥事永盡無餘持戒精進念定總持皆悉具足阿難當知若有聞此六字章句救苦醫王無上神呪稱觀世音菩薩大悲名字罪垢消除即於現身得見八十億諸佛皆來授手為說大悲施無畏者功德神力并六字章句以見佛故即得無忘旋陀羅尼爾時世尊而說偈言大悲大名稱吉祥安樂人恆說吉祥句救濟極苦者衆生若聞名離苦得解脫亦遊戲地獄大悲代受苦或處畜生中化作畜生形教以大智慧令發無上心或處阿修羅軟言調伏心令除憍慢習疾至無為岸現身作餓鬼手出香色乳飢渴逼切者施令得飽滿大慈大悲心遊戲於五道恆以善集慧普教一切衆無上勝方便令離生死苦常得安樂處到大涅槃岸爾時世尊說是語已告阿難言是六字章句畢定吉祥真實不虛若有聞者獲大善利得無量功德說是語已王舍大城有一比丘名優波斯那精進勇猛勤行難行苦行如救頭然在寒林中與無央數大衆圍繞自說往昔作諸惡行殺生無量聞觀世音菩薩六字章句正念思惟觀心心脈使想一處見觀世音菩薩即得解脫成阿羅漢云何當得見觀世音菩薩及十方佛若欲得見端身正心使心不動心氣相續以左手置右手上舉舌向腭令息調勻使氣不麁不細安祥徐數從一至十成就息念無分散意使氣不麁亦不外向不澀不滑如嬰兒飲乳吸氣𡂡之不青不白調和得中從於心端四十脈下取一中脈令氣從中安隱得至十四脈中從大脈生至於舌下復從舌脈出至於舌端不青不白不黃不黑如琉璃器正長八寸至於鼻端還入心根令心明淨佛告諸比丘此大精進勇猛寶憧六字章句消伏毒害大悲功德觀世音菩薩以此數息心定力故如駛水流疾疾得見觀世音菩薩及十方佛佛告諸比丘汝等善聽欲服甘露無上法味若諸比丘已得出家當自攝身不壞威儀端坐正受無外向意觀於苦空無常敗壞不久磨滅修五門禪當自觀身從頭至足一一節間皆令係念停住不散諦觀衆節如芭蕉樹內外俱空當知色受想行識亦復如是佛說是語時尊者舍利弗在寒林中還坐樹下已解佛意端坐正受入于三昧身真金色令無數人見者歡喜發菩提心時優波斯那即從座起至尊者舍利弗所頭面著地接足作禮白言尊者向者如來讚歎數息以是因緣獲大善利云何數息唯願尊者為我解說眼眼識與色相應云何攝住耳耳識與聲相應云何攝住鼻鼻識與香相應云何攝住舌舌識與味相應云何攝住意意識與攀緣相應云何攝住諸顛倒想與顛倒相應云何攝住色聲香味觸與細滑相應云何攝住而此識賊如猿猴走遊戲六根遍緣諸法云何攝住時舍利弗告優波斯那汝今當觀地大地無堅性水大水性不住風大風性無礙從顛倒有火大火性不實假因緣生色受想行識一一性相同於水火風等皆悉入於如實之際時優波斯那聞是語已身如水火得四大定通達五陰空無所有殺諸結賊豁然意解得阿羅漢身中出火即自碎身入般涅槃時舍利弗收其舍利於上起塔已為佛作禮白佛言世尊佛說禪定第一甘露無上法味若有服者身如琉璃毛孔見佛觀無明行乃至老死一一性相皆悉不實如空谷響如芭蕉樹無堅實如熱時焰如野馬行如乾闥婆城如水上泡如幻如化如露如電一一諦觀十二因緣成緣覺道或入寂定琉璃三昧見佛無數發無上心修童真行住不退轉佛告舍利弗如優波斯那聞我說是大悲章句數息定法破無數億洞然之惡成阿羅漢具戒定智解脫知見身出水火碎身滅度令無數人發大善心舍利弗當知若善男子善女人得聞觀世音菩薩大悲名號及消伏毒害六字章句數息係念淨行之法除無數劫所造惡業破惡業障現身得見無量無邊諸佛聞說妙法隨意無礙發三種清淨三菩提心若有宿世罪業因緣及現所造極重惡行夢中得見觀世音菩薩如大猛風吹於重雲皆悉四散得離重罪惡業生諸佛前佛說是語已告舍利弗我今為此受持觀世音菩薩名號消伏毒害無上章句說偈讚歎我敕提頭賴吒等慈心擁護受持經令聞大悲名號人譬如天子法臣護我敕海龍伊羅鉢慈心擁護受持經如護眼目愛己子晝夜六時不遠離我敕閻婆羅剎子無數毒龍及龍女慈心擁護持經者如愛頂腦不敢觸我敕毗留勒迦王慈心擁護持經者如母愛子心無厭晝夜擁護行住俱我敕難陀跋難陀娑伽羅王優波陀慈心擁護持經者恭敬供養接足禮譬如諸天奉帝釋亦如孝子敬父母猶如貧人護財寶如盲須眼及正導我敕一切諸鬼神小龍毒蛇毒害獸一切惡人惡口者違逆此呪起不善現身白癩膿血流後墮地獄長夜苦是故應當慈心護受持讀誦灌頂句地獄清淨如蓮華餓鬼破碎無八難後生佛前入三昧畢定當得不退轉普施一切大安樂教諸衆生修十地我從過去無數佛聞是消伏毒害呪消除三障無諸惡五眼具足成菩提永與三界作父母施其安樂得止息若有聞我名號者亦聞大悲觀世音誦持此呪離諸惡不墮地獄及畜生蓮華化生為父母心淨柔軟無塵垢必聞無上大慧明心定如地不可動一切佛出世明照如日月身出大智光如燒紫金山三十二相中流出八十好譬如須彌山映顯于大海衆生聞名者永離三惡道得住無為處常樂大涅槃一切佛興世安樂衆生故異口各各身端坐金剛座口出五色光蓮華葉形舌讚歎大悲者調御師子法護世觀世音畢定消毒害淨於三毒根成佛道無疑爾時世尊說此偈已為受持觀世音菩薩名者擁護此經故說灌頂吉祥陀羅尼而說呪曰多姪咃烏耽毗詈名住山外鬼兜毗詈名住山窟鬼耽𡌹名爛目鬼波羅耽𡌹名食殘果鬼住一切果樹下食殘捺吒修捺吒名好偷鬼枳跋吒名殺魚鬼牟那耶名出家鬼三摩耶名三昧鬼檀提名捉杖鬼膩羅枳尸名好髮女鬼婆羅鳩卑名住破肌鬼烏詈名瓔鬼欀瞿詈名尾鬼𦀟訶佛告舍利弗如此灌頂陀羅尼章句畢定吉祥若有得聞受持讀誦破惡業障終不橫死舍利弗白佛言世尊如此神呪大吉祥句普施一切無所怖畏世尊往昔從何佛所得聞此句唯願世尊分別解說使未來世普得聞知獲大安樂免離橫死刀杖毒藥水火盜賊所不能害佛告舍利弗我從過去無量佛所得聞此句受持讀誦即得超越八千萬劫生死之罪又念過去八十萬劫有佛世尊名一切世間勝十號具足彼佛世尊為我演說如上章句我即數息使心不散㸌然音解消伏結使得無生法忍住首楞嚴三昧若善男子善女人得聞此經受持讀誦書寫解說即得超越無量無數阿僧祇劫生死之罪消伏毒害不與禍對佛說是語時五百長者子得無生法忍無數人天發阿耨多羅三藐三菩提心舍利弗阿難等白佛言世尊此觀佛三昧海請觀世音菩薩消伏毒害陀羅尼呪所至到處一切吉祥如梵天王衆所愛敬佛告阿難如是如是如汝所說若善男子善女人得聞此經首題名字常得見佛及諸菩薩具足善根生淨佛國說此品時八十億天子天女及龍鬼神皆悉歡喜發菩提心舍利弗阿難等聞佛所說禮佛而退
